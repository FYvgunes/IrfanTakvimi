[build]
  publish = "build/web"
  command = """
    if cd flutter; then git pull && cd ..; else git clone https://github.com/flutter/flutter.git --depth 1 -b stable; fi
    export PATH="$PATH:$(pwd)/flutter/bin"
    flutter --version
    flutter config --enable-web
    flutter pub get
    flutter build web --release
  """

[build.environment]
  FLUTTER_CLI_TELEMETRY_OPTOUT = "1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
